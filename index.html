<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POD Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sora', sans-serif;
  background: #0d0f14;
  color: #e8eaf0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container { text-align: center; }
.title { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
.title span { color: #5b8df6; }
.sub { font-size: 13px; color: #555c70; margin-bottom: 48px; }
.cards { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.card {
  background: #13161e;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 32px 40px;
  width: 200px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: all 0.2s;
  display: block;
}
.card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
.card .icon { font-size: 32px; margin-bottom: 14px; }
.card .label { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.card .desc { font-size: 12px; color: #555c70; }
.card.admin:hover { border-color: #5b8df6; }
.card.employee:hover { border-color: #3ecf8e; }
</style>
</head>
<body>
<div class="container">
  <div class="title">POD <span>Manager</span></div>
  <div class="sub">Chọn giao diện để tiếp tục</div>
  <div class="cards">
    <a href="/admin.html" class="card admin">
      <div class="icon">◈</div>
      <div class="label">Admin</div>
      <div class="desc">Quản lý hệ thống</div>
    </a>
    <a href="/employee.html" class="card employee">
      <div class="icon">◉</div>
      <div class="label">Nhân viên</div>
      <div class="desc">Cổng nhân viên</div>
    </a>
  </div>
</div>
</body>
</html>
